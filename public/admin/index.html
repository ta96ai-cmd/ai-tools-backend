<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07080a; --surface:#0f1115; --card:#13151a; --border:#1f2229;
  --accent:#e8ff47; --accent2:#4ecdc4; --red:#ff4757; --green:#2ed573;
  --text:#eef0f4; --muted:#6b7280; --tag:#1a1d24;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;}
/* SIDEBAR */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:50;}
.sidebar-logo{padding:20px 18px;border-bottom:1px solid var(--border);}
.sidebar-logo .logo{font-weight:800;font-size:18px;letter-spacing:-0.5px;}
.sidebar-logo .logo span{color:var(--accent);}
.sidebar-logo .sub{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.nav-section{padding:16px 12px 8px;font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;cursor:pointer;transition:all .15s;color:var(--muted);font-size:13px;font-weight:600;margin:1px 8px;border:none;background:none;width:calc(100% - 16px);text-align:left;}
.nav-item:hover{background:var(--tag);color:var(--text);}
.nav-item.active{background:rgba(232,255,71,.12);color:var(--accent);}
.nav-item .icon{font-size:16px;width:20px;text-align:center;}
.sidebar-bottom{margin-top:auto;padding:12px;border-top:1px solid var(--border);}
.user-chip{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--tag);}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#000;flex-shrink:0;}
.user-name{font-size:12px;font-weight:700;}
.user-role{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);}
/* MAIN */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;}
/* TOP BAR */
.topbar{padding:14px 28px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:40;}
.page-title{font-size:1.1rem;font-weight:800;flex:1;}
.page-title span{color:var(--accent);}
.topbar-badge{font-family:'Space Mono',monospace;font-size:10px;padding:4px 10px;border-radius:100px;border:1px solid var(--border);color:var(--muted);}
.topbar-badge b{color:var(--accent);}
.btn{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.5px;padding:8px 16px;border-radius:7px;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#000;font-weight:700;}
.btn-primary:hover{opacity:.9;}
.btn-ghost{background:var(--tag);color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{border-color:#555;color:var(--accent);}
.btn-danger{background:rgba(255,71,87,.15);color:var(--red);border:1px solid rgba(255,71,87,.3);}
.btn-danger:hover{background:rgba(255,71,87,.25);}
.btn-success{background:rgba(46,213,115,.15);color:var(--green);border:1px solid rgba(46,213,115,.3);}
.btn-success:hover{background:rgba(46,213,115,.25);}
/* CONTENT */
.content{padding:28px;flex:1;overflow-y:auto;}
.panel{display:none;}
.panel.active{display:block;}
/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:28px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
.stat-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.stat-value{font-size:2rem;font-weight:800;line-height:1;}
.stat-value.accent{color:var(--accent);}
.stat-value.teal{color:var(--accent2);}
.stat-value.red{color:var(--red);}
.stat-value.green{color:var(--green);}
/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px;}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.table-title{font-size:14px;font-weight:700;flex:1;}
.search-input{background:var(--tag);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:11px;padding:7px 14px;border-radius:7px;outline:none;width:220px;transition:border-color .2s;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}
table{width:100%;border-collapse:collapse;}
th{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);}
td{padding:11px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.badge{font-family:'Space Mono',monospace;font-size:9px;padding:3px 8px;border-radius:100px;font-weight:700;}
.badge-green{background:rgba(46,213,115,.15);color:var(--green);}
.badge-red{background:rgba(255,71,87,.15);color:var(--red);}
.badge-yellow{background:rgba(255,214,0,.15);color:#ffd600;}
.badge-blue{background:rgba(78,205,196,.15);color:var(--accent2);}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:15px;font-weight:800;}
.modal-close{background:var(--tag);border:none;color:var(--muted);cursor:pointer;width:28px;height:28px;border-radius:6px;font-size:14px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:24px;}
.form-group{margin-bottom:18px;}
.form-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:8px;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--tag);border:1px solid var(--border);color:var(--text);font-family:'Syne',sans-serif;font-size:13px;padding:10px 14px;border-radius:8px;outline:none;transition:border-color .2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-check{display:flex;align-items:center;gap:8px;font-size:13px;}
.form-check input{accent-color:var(--accent);width:16px;height:16px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
/* LOGIN */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:360px;}
.login-logo{font-size:1.6rem;font-weight:800;margin-bottom:4px;}
.login-logo span{color:var(--accent);}
.login-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:28px;}
.login-err{background:rgba(255,71,87,.15);border:1px solid rgba(255,71,87,.3);color:var(--red);padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:16px;display:none;}
/* TOAST */
.toast-container{position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--card);border:1px solid var(--border);padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;min-width:240px;animation:slideIn .3s ease;}
.toast.success{border-left:3px solid var(--green);}
.toast.error{border-left:3px solid var(--red);}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">AI<span>Tools</span></div>
    <div class="login-sub">ADMIN PANEL</div>
    <div class="login-err" id="loginErr"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="loginEmail" type="email" placeholder="admin@aitools.com" value="admin@aitools.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="loginPassword" type="password" placeholder="••••••••" value="admin123">
    </div>
    <button class="btn btn-primary" style="width:100%;padding:12px;" onclick="doLogin()">Sign In →</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toasts"></div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo">AI<span>Tools</span></div>
    <div class="sub">Admin Panel</div>
  </div>
  <div class="nav-section">Menu</div>
  <button class="nav-item active" onclick="showPanel('dashboard',this)"><span class="icon">📊</span>Dashboard</button>
  <button class="nav-item" onclick="showPanel('tools',this)"><span class="icon">🔧</span>Tools</button>
  <button class="nav-item" onclick="showPanel('submissions',this)"><span class="icon">📥</span>Submissions</button>
  <button class="nav-item" onclick="showPanel('users',this)"><span class="icon">👤</span>Users</button>
  <div class="sidebar-bottom">
    <div class="user-chip">
      <div class="user-avatar" id="avatarInitial">A</div>
      <div>
        <div class="user-name" id="sidebarName">Admin</div>
        <div class="user-role">ADMINISTRATOR</div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="page-title" id="pageTitle"><span>Dashboard</span></div>
    <div class="topbar-badge">Tools: <b id="badgeTools">–</b></div>
    <div class="topbar-badge">Users: <b id="badgeUsers">–</b></div>
    <button class="btn btn-ghost" onclick="logout()">Logout</button>
  </div>

  <div class="content">

    <!-- DASHBOARD -->
    <div class="panel active" id="panel-dashboard">
      <div class="stats-row" id="statsRow"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="table-wrap">
          <div class="table-header"><div class="table-title">🏆 Most Favourited</div></div>
          <table><thead><tr><th>Tool</th><th>Favs</th></tr></thead>
          <tbody id="topFavedBody"></tbody></table>
        </div>
        <div class="table-wrap">
          <div class="table-header"><div class="table-title">🕐 Recent Users</div></div>
          <table><thead><tr><th>User</th><th>Role</th><th>Joined</th></tr></thead>
          <tbody id="recentUsersBody"></tbody></table>
        </div>
      </div>
    </div>

    <!-- TOOLS -->
    <div class="panel" id="panel-tools">
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">🔧 All Tools</div>
          <input class="search-input" id="toolSearch" placeholder="Search tools…" oninput="filterTable('toolsBody',this.value)">
          <button class="btn btn-primary" onclick="openAddTool()">+ Add Tool</button>
        </div>
        <table>
          <thead><tr><th>Icon</th><th>Name</th><th>Category</th><th>Free</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="toolsBody"></tbody>
        </table>
      </div>
    </div>

    <!-- SUBMISSIONS -->
    <div class="panel" id="panel-submissions">
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">📥 Submissions</div>
          <select class="search-input" id="subFilter" onchange="loadSubmissions()" style="width:140px;">
            <option value="">All</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <table>
          <thead><tr><th>Name</th><th>Category</th><th>Submitted By</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="subsBody"></tbody>
        </table>
      </div>
    </div>

    <!-- USERS -->
    <div class="panel" id="panel-users">
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">👤 Users</div>
          <input class="search-input" id="userSearch" placeholder="Search users…" oninput="filterTable('usersBody',this.value)">
        </div>
        <table>
          <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead>
          <tbody id="usersBody"></tbody>
        </table>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /main -->

<!-- ADD/EDIT TOOL MODAL -->
<div class="modal-overlay" id="toolModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="toolModalTitle">Add Tool</div>
      <button class="modal-close" onclick="closeModal('toolModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editToolId">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Tool Name *</label>
          <input class="form-input" id="toolName" placeholder="e.g. ChatGPT">
        </div>
        <div class="form-group">
          <label class="form-label">Icon (emoji)</label>
          <input class="form-input" id="toolIcon" placeholder="💬" maxlength="4">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Category *</label>
        <input class="form-input" id="toolCategory" placeholder="e.g. AI Chatbots">
      </div>
      <div class="form-group">
        <label class="form-label">URL *</label>
        <input class="form-input" id="toolUrl" type="url" placeholder="https://...">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="toolDesc" placeholder="What does this tool do?"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Tags (comma separated)</label>
        <input class="form-input" id="toolTags" placeholder="chat, ai, free">
      </div>
      <div class="form-check">
        <input type="checkbox" id="toolFree" checked>
        <label for="toolFree">Free / Freemium tier available</label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('toolModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTool()">Save Tool</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:3001/api';
let token = localStorage.getItem('admin_token') || '';
let currentUser = null;

// ── AUTH ──
async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const pass  = document.getElementById('loginPassword').value;
  try {
    const r = await fetch(`${API}/auth/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, password: pass })
    });
    const d = await r.json();
    if (!r.ok) { showLoginErr(d.error); return; }
    if (d.user.role !== 'admin') { showLoginErr('Admin access only'); return; }
    token = d.token;
    currentUser = d.user;
    localStorage.setItem('admin_token', token);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('sidebarName').textContent = d.user.username;
    document.getElementById('avatarInitial').textContent = d.user.username[0].toUpperCase();
    loadDashboard();
  } catch(e) { showLoginErr('Server offline — start the backend'); }
}

function showLoginErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg; el.style.display = 'block';
}

function logout() {
  localStorage.removeItem('admin_token');
  token = '';
  document.getElementById('loginScreen').style.display = 'flex';
}

async function apiFetch(path, opts = {}) {
  const r = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+token, ...(opts.headers||{}) }
  });
  const d = await r.json();
  if (r.status === 401) { logout(); throw new Error('Unauthorised'); }
  if (!r.ok) throw new Error(d.error || 'API error');
  return d;
}

// ── PANELS ──
function showPanel(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
  const titles = {dashboard:'Dashboard',tools:'Tools',submissions:'Submissions',users:'Users'};
  document.getElementById('pageTitle').innerHTML = `<span>${titles[name]}</span>`;
  if (name === 'tools')       loadTools();
  if (name === 'submissions') loadSubmissions();
  if (name === 'users')       loadUsers();
  if (name === 'dashboard')   loadDashboard();
}

// ── DASHBOARD ──
async function loadDashboard() {
  try {
    const d = await apiFetch('/admin/dashboard');
    const s = d.stats;
    document.getElementById('badgeTools').textContent = s.totalTools;
    document.getElementById('badgeUsers').textContent = s.totalUsers;

    document.getElementById('statsRow').innerHTML = [
      ['Total Tools', s.totalTools, 'accent'],
      ['Active Tools', s.activeTools, 'teal'],
      ['Total Users', s.totalUsers, 'green'],
      ['Total Favs', s.totalFavs, 'accent'],
      ['Pending Subs', s.pendingSubs, 'red'],
      ['Approved Subs', s.approvedSubs, 'green'],
    ].map(([label,val,cls]) => `
      <div class="stat-card">
        <div class="stat-label">${label}</div>
        <div class="stat-value ${cls}">${val}</div>
      </div>
    `).join('');

    document.getElementById('topFavedBody').innerHTML = d.topFavedTools.length
      ? d.topFavedTools.map(t => `<tr><td>${t.tool}</td><td><b style="color:var(--accent)">${t.count}</b></td></tr>`).join('')
      : '<tr><td colspan="2" style="color:var(--muted);text-align:center;padding:20px">No favourites yet</td></tr>';

    document.getElementById('recentUsersBody').innerHTML = d.recentUsers.map(u => `
      <tr>
        <td><b>${u.username}</b></td>
        <td><span class="badge ${u.role==='admin'?'badge-yellow':'badge-blue'}">${u.role}</span></td>
        <td style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)">${u.createdAt?.slice(0,10)||'–'}</td>
      </tr>
    `).join('');
  } catch(e) { toast(e.message,'error'); }
}

// ── TOOLS ──
async function loadTools() {
  try {
    const d = await apiFetch('/admin/tools');
    document.getElementById('toolsBody').innerHTML = d.tools.map(t => `
      <tr>
        <td style="font-size:20px">${t.icon||'🔧'}</td>
        <td><b>${t.name}</b></td>
        <td style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)">${t.category}</td>
        <td><span class="badge ${t.free?'badge-green':'badge-yellow'}">${t.free?'FREE':'PAID'}</span></td>
        <td><span class="badge ${t.approved!==false?'badge-green':'badge-red'}">${t.approved!==false?'Live':'Hidden'}</span></td>
        <td style="display:flex;gap:6px">
          <button class="btn btn-ghost" style="font-size:9px;padding:5px 10px" onclick='openEditTool(${JSON.stringify(t)})'>Edit</button>
          <button class="btn btn-danger" style="font-size:9px;padding:5px 10px" onclick="deleteTool(${t.id},'${t.name}')">Del</button>
        </td>
      </tr>
    `).join('');
  } catch(e) { toast(e.message,'error'); }
}

// ── SUBMISSIONS ──
async function loadSubmissions() {
  try {
    const status = document.getElementById('subFilter').value;
    const d = await apiFetch('/admin/submissions' + (status ? '?status='+status : ''));
    document.getElementById('subsBody').innerHTML = d.submissions.length ? d.submissions.map(s => `
      <tr>
        <td><b>${s.name}</b><div style="font-size:11px;color:var(--muted)">${s.url}</div></td>
        <td style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)">${s.category}</td>
        <td>${s.submittedByName||'–'}</td>
        <td style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)">${s.submittedAt?.slice(0,10)||'–'}</td>
        <td><span class="badge ${s.status==='approved'?'badge-green':s.status==='rejected'?'badge-red':'badge-yellow'}">${s.status}</span></td>
        <td style="display:flex;gap:6px">
          ${s.status==='pending'?`
            <button class="btn btn-success" style="font-size:9px;padding:5px 10px" onclick="approveSub(${s.id})">✓ Approve</button>
            <button class="btn btn-danger" style="font-size:9px;padding:5px 10px" onclick="rejectSub(${s.id})">✗ Reject</button>
          `:'<span style="color:var(--muted);font-size:11px">–</span>'}
        </td>
      </tr>
    `).join('') : '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--muted)">No submissions found</td></tr>';
  } catch(e) { toast(e.message,'error'); }
}

async function approveSub(id) {
  try {
    await apiFetch(`/admin/submissions/${id}/approve`, {method:'PUT'});
    toast('Submission approved & tool added ✓','success');
    loadSubmissions(); loadDashboard();
  } catch(e) { toast(e.message,'error'); }
}

async function rejectSub(id) {
  try {
    await apiFetch(`/admin/submissions/${id}/reject`, {method:'PUT', body: JSON.stringify({reason:'Does not meet criteria'})});
    toast('Submission rejected','success');
    loadSubmissions();
  } catch(e) { toast(e.message,'error'); }
}

// ── USERS ──
async function loadUsers() {
  try {
    const d = await apiFetch('/admin/users');
    document.getElementById('usersBody').innerHTML = d.users.map(u => `
      <tr>
        <td style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)">#${u.id}</td>
        <td><b>${u.username}</b></td>
        <td style="color:var(--muted);font-size:12px">${u.email}</td>
        <td><span class="badge ${u.role==='admin'?'badge-yellow':'badge-blue'}">${u.role}</span></td>
        <td style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)">${u.createdAt?.slice(0,10)||'–'}</td>
      </tr>
    `).join('');
  } catch(e) { toast(e.message,'error'); }
}

// ── TOOL MODAL ──
function openAddTool() {
  document.getElementById('toolModalTitle').textContent = 'Add New Tool';
  document.getElementById('editToolId').value = '';
  ['toolName','toolIcon','toolCategory','toolUrl','toolDesc','toolTags'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('toolFree').checked = true;
  document.getElementById('toolModal').classList.add('open');
}

function openEditTool(t) {
  document.getElementById('toolModalTitle').textContent = 'Edit Tool';
  document.getElementById('editToolId').value  = t.id;
  document.getElementById('toolName').value     = t.name||'';
  document.getElementById('toolIcon').value     = t.icon||'';
  document.getElementById('toolCategory').value = t.category||'';
  document.getElementById('toolUrl').value      = t.url||'';
  document.getElementById('toolDesc').value     = t.description||'';
  document.getElementById('toolTags').value     = (t.tags||[]).join(', ');
  document.getElementById('toolFree').checked   = t.free!==false;
  document.getElementById('toolModal').classList.add('open');
}

async function saveTool() {
  const id   = document.getElementById('editToolId').value;
  const body = {
    name:        document.getElementById('toolName').value.trim(),
    icon:        document.getElementById('toolIcon').value.trim() || '🔧',
    category:    document.getElementById('toolCategory').value.trim(),
    url:         document.getElementById('toolUrl').value.trim(),
    description: document.getElementById('toolDesc').value.trim(),
    tags:        document.getElementById('toolTags').value.split(',').map(t=>t.trim()).filter(Boolean),
    free:        document.getElementById('toolFree').checked,
    approved:    true,
  };

  if (!body.name || !body.category || !body.url) { toast('Name, category and URL are required','error'); return; }

  try {
    if (id) {
      await apiFetch(`/admin/tools/${id}`, {method:'PUT', body:JSON.stringify(body)});
      toast('Tool updated ✓','success');
    } else {
      await apiFetch('/admin/tools', {method:'POST', body:JSON.stringify(body)});
      toast('Tool created ✓','success');
    }
    closeModal('toolModal');
    loadTools(); loadDashboard();
  } catch(e) { toast(e.message,'error'); }
}

async function deleteTool(id, name) {
  if (!confirm(`Delete "${name}"?`)) return;
  try {
    await apiFetch(`/admin/tools/${id}`, {method:'DELETE'});
    toast('Tool deleted','success');
    loadTools(); loadDashboard();
  } catch(e) { toast(e.message,'error'); }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── TABLE FILTER ──
function filterTable(tbodyId, query) {
  const q = query.toLowerCase();
  document.querySelectorAll(`#${tbodyId} tr`).forEach(row => {
    row.style.display = q ? (row.textContent.toLowerCase().includes(q) ? '' : 'none') : '';
  });
}

// ── TOAST ──
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── AUTO-LOGIN if token exists ──
if (token) {
  apiFetch('/auth/me').then(u => {
    if (u.role !== 'admin') { logout(); return; }
    currentUser = u;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('sidebarName').textContent = u.username;
    document.getElementById('avatarInitial').textContent = u.username[0].toUpperCase();
    loadDashboard();
  }).catch(() => { localStorage.removeItem('admin_token'); token=''; });
}

// Enter key on login
document.getElementById('loginPassword').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
